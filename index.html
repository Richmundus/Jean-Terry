<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Loving Memory of Terry &amp; Jean Dunn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0d0b0a;
            --bg-card:    #1a1715;
            --text:       #e8ddd0;
            --text-muted: #7a6a58;
            --gold:       #c8a96e;
            --gold-light: #dfc08a;
            --border:     rgba(200, 169, 110, 0.15);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            line-height: 1.7;
        }

        /* ─── Navigation ─── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 11, 10, 0.93);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 56px;
        }

        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.05rem;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.76rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            transition: color 0.25s;
        }

        .nav-links a:hover { color: var(--gold); }

        /* ─── Header ─── */
        header {
            text-align: center;
            padding: 100px 24px 80px;
        }

        .header-ornament {
            display: block;
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 0.7em;
            opacity: 0.45;
            margin-bottom: 36px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(2rem, 5vw, 3.8rem);
            letter-spacing: 0.04em;
            line-height: 1.25;
        }

        .names {
            display: block;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(1.4rem, 3.5vw, 2.5rem);
            color: var(--gold);
            margin-top: 10px;
            letter-spacing: 0.06em;
        }

        .header-rule {
            width: 90px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 44px auto;
        }

        .dedication {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.9;
        }

        /* ─── Gallery sections ─── */
        .section-divider {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin: 0 40px;
        }

        .gallery-section {
            max-width: 1440px;
            margin: 0 auto;
            padding: 72px 40px;
        }

        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 44px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            font-size: 2.1rem;
            letter-spacing: 0.04em;
            color: var(--text);
        }

        .section-count {
            font-size: 0.76rem;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 7px;
        }

        /* ─── Download All button ─── */
        .btn-download-all {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 11px 26px;
            border: 1px solid rgba(200, 169, 110, 0.4);
            background: transparent;
            color: var(--gold);
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: 0.76rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
            white-space: nowrap;
        }

        .btn-download-all:hover:not(:disabled) {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--bg);
        }

        .btn-download-all:disabled { opacity: 0.38; cursor: not-allowed; }

        /* ─── Photo grid ─── */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
        }

        /* ─── Photo item ─── */
        .photo-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--bg-card);
            cursor: pointer;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.35s ease;
            filter: brightness(0.88) saturate(0.9);
        }

        .photo-item:hover img {
            transform: scale(1.06);
            filter: brightness(1) saturate(1);
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.06) 55%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 14px;
        }

        .photo-item:hover .photo-overlay { opacity: 1; }

        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(200, 169, 110, 0.9);
            border: none;
            color: var(--bg);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .btn-icon:hover { background: var(--gold-light); }

        /* ─── Lightbox ─── */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .lightbox.open { display: flex; }

        .lb-img-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 90vw;
            max-height: 83vh;
        }

        .lb-img-wrap img {
            max-width: 90vw;
            max-height: 83vh;
            object-fit: contain;
            display: block;
            box-shadow: 0 12px 60px rgba(0,0,0,0.85);
        }

        .lb-close {
            position: fixed;
            top: 16px;
            right: 22px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            line-height: 1;
            cursor: pointer;
            padding: 6px;
            transition: color 0.2s;
        }

        .lb-close:hover { color: var(--gold); }

        .lb-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 1.6rem;
            line-height: 1;
            padding: 18px 14px;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }

        .lb-nav:hover { color: var(--gold); background: rgba(0,0,0,0.65); }
        .lb-prev { left: 16px; }
        .lb-next { right: 16px; }

        .lb-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 18px 24px 22px;
            background: linear-gradient(to top, rgba(0,0,0,0.82), transparent);
        }

        .lb-counter {
            color: var(--text-muted);
            font-size: 0.76rem;
            letter-spacing: 0.12em;
        }

        .lb-download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 20px;
            background: var(--gold);
            color: var(--bg);
            text-decoration: none;
            font-family: 'Lato', sans-serif;
            font-size: 0.73rem;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .lb-download-btn:hover { background: var(--gold-light); }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; }

        /* ─── Footer ─── */
        footer {
            text-align: center;
            border-top: 1px solid var(--border);
            padding: 64px 24px 52px;
        }

        .footer-ornament {
            display: block;
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 0.5em;
            opacity: 0.38;
            margin-bottom: 22px;
        }

        footer p {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* ─── Responsive ─── */
        @media (max-width: 680px) {
            nav { padding: 0 20px; }
            .nav-links { gap: 18px; }
            .gallery-section { padding: 48px 20px; }
            .section-divider { margin: 0 20px; }
            .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .section-header { flex-direction: column; align-items: flex-start; }
            .lb-nav { padding: 12px 10px; font-size: 1.2rem; }
            header { padding: 70px 20px 60px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#top" class="nav-brand">Terry &amp; Jean Dunn</a>
    <ul class="nav-links">
        <li><a href="#gallery1">Gallery One</a></li>
        <li><a href="#gallery2">Gallery Two</a></li>
    </ul>
</nav>

<header id="top">
    <span class="header-ornament">&#x2014; &#x2736; &#x2014;</span>
    <h1>
        In Loving Memory
        <span class="names">Terry &amp; Jean Dunn</span>
    </h1>
    <div class="header-rule"></div>
    <p class="dedication">
        Cherished memories of two wonderful people<br>
        who will forever live in our hearts.
    </p>
</header>

<main>

    <section class="gallery-section" id="gallery1">
        <div class="section-header">
            <div>
                <h2 class="section-title">Gallery One</h2>
                <p class="section-count" id="count0"></p>
            </div>
            <button class="btn-download-all" id="dlBtn0" onclick="downloadAll(0)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download All Photos
            </button>
        </div>
        <div class="photo-grid" id="grid0"></div>
    </section>

    <hr class="section-divider">

    <section class="gallery-section" id="gallery2">
        <div class="section-header">
            <div>
                <h2 class="section-title">Gallery Two</h2>
                <p class="section-count" id="count1"></p>
            </div>
            <button class="btn-download-all" id="dlBtn1" onclick="downloadAll(1)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download All Photos
            </button>
        </div>
        <div class="photo-grid" id="grid1"></div>
    </section>

</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close viewer">&#x2715;</button>
    <button class="lb-nav lb-prev" onclick="navigateLightbox(-1)" aria-label="Previous photo">&#x2039;</button>
    <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="Photo of Terry and Jean Dunn">
    </div>
    <button class="lb-nav lb-next" onclick="navigateLightbox(1)" aria-label="Next photo">&#x203A;</button>
    <div class="lb-footer">
        <span class="lb-counter" id="lb-counter"></span>
        <a id="lb-dl" class="lb-download-btn" download>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download Photo
        </a>
    </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<footer>
    <span class="footer-ornament">&#x2736;</span>
    <p>Terry &amp; Jean Dunn &mdash; Loved always, remembered forever.</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    const galleries = [
        {
            folder: 'set 1',
            zipName: 'Terry-and-Jean-Gallery-One.zip',
            images: [
                '20260613_161657.jpg',
                
                '20260613_161830.jpg',
                '20260613_162000.jpg',
                
                'ChatGPT Image Jun 13, 2026, 05_26_56 PM.png',
                'ChatGPT Image Jun 13, 2026, 05_32_45 PM.png',
                'ChatGPT Image Jun 13, 2026, 05_37_55 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_31_46 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_31_52 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_04 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_08 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_14 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_20 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_37 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_43 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_50 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_32_55 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_33_01 PM.png',
                'ChatGPT Image Jun 13, 2026, 06_42_51 PM.png',
                'ChatGPT Image Jun 15, 2026, 06_16_06 PM.png',
                'IMG-20260613-WA0007.jpg',
                'IMG-20260613-WA0008.jpg',
                'IMG-20260613-WA0010.jpg',
                'IMG-20260613-WA0011.jpg',
                'IMG-20260615-WA0000.jpg',
                'IMG-20260615-WA0001.jpg',
                'grandad.jpg',
                'nan crop.jpg'
            ]
        },
        {
            folder: 'set 2',
            zipName: 'Terry-and-Jean-Gallery-Two.zip',
            images: [
                '236.jpg',
                'ChatGPT Image Jun 15, 2026, 06_49_16 PM.png',
                'ChatGPT Image Jun 15, 2026, 06_52_21 PM.png',
                'IMG-20260613-WA0009.jpg',
                'IMG-20260613-WA0013.jpg',
                'IMG-20260613-WA0014.jpg',
                'IMG-20260613-WA0016.jpg',
                'IMG-20260613-WA0018.jpg',
                'IMG-20260613-WA0019.jpg',
                'IMG-20260613-WA0020.jpg',
                'IMG-20260615-WA0003.jpg',
                'IMG-20260615-WA0004.jpg',
                'Photo_2026-06-13_175620.jpg',
                'Photo_2026-06-13_175803 (2).jpg',
                'Photo_2026-06-13_180102 (3).jpg',
                'Photo_2026-06-13_180434 (4).jpg',
                'Photo_2026-06-13_180550 (5).jpg',
                'Photo_2026-06-13_180646 (6).jpg',
                'Photo_2026-06-13_180859 (7).jpg',
                'Photo_2026-06-13_181001 (8).jpg',
                'Photo_2026-06-13_181113 (9).jpg',
                'Photo_2026-06-13_181212 (10).jpg',
                'Photo_2026-06-13_181345 (12).jpg',
                'Photo_2026-06-13_181446 (13).jpg',
                'Photo_2026-06-13_181534 (14).jpg',
                'Photo_2026-06-13_185521.jpg',
                'Photo_2026-06-13_185658 (3).jpg'
            ]
        }
    ];

    // ─── Build galleries ───
    galleries.forEach((g, gIdx) => {
        const grid = document.getElementById('grid' + gIdx);
        document.getElementById('count' + gIdx).textContent = g.images.length + ' photographs';

        g.images.forEach((filename, imgIdx) => {
            const src = encodeURIComponent(g.folder) + '/' + encodeURIComponent(filename);

            const item = document.createElement('div');
            item.className = 'photo-item';
            item.setAttribute('role', 'button');
            item.setAttribute('tabindex', '0');
            item.setAttribute('aria-label', 'View photo ' + (imgIdx + 1));
            item.innerHTML = `
                <img src="${src}" alt="Photo of Terry and Jean Dunn" loading="lazy">
                <div class="photo-overlay">
                    <a href="${src}" download="${filename.replace(/"/g, '&quot;')}"
                       class="btn-icon" title="Download this photo"
                       aria-label="Download photo"
                       onclick="event.stopPropagation()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </a>
                </div>`;

            item.addEventListener('click', () => openLightbox(gIdx, imgIdx));
            item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLightbox(gIdx, imgIdx); });
            grid.appendChild(item);
        });
    });

    // ─── Lightbox ───
    let lb = { gIdx: 0, imgIdx: 0 };

    function makeSrc(gIdx, imgIdx) {
        const g = galleries[gIdx];
        return encodeURIComponent(g.folder) + '/' + encodeURIComponent(g.images[imgIdx]);
    }

    function openLightbox(gIdx, imgIdx) {
        lb = { gIdx, imgIdx };
        updateLightbox();
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
        document.getElementById('lb-close-btn') && document.getElementById('lb-close-btn').focus();
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }

    function navigateLightbox(dir) {
        const total = galleries[lb.gIdx].images.length;
        lb.imgIdx = (lb.imgIdx + dir + total) % total;
        updateLightbox();
    }

    function updateLightbox() {
        const g = galleries[lb.gIdx];
        const filename = g.images[lb.imgIdx];
        const src = makeSrc(lb.gIdx, lb.imgIdx);
        document.getElementById('lb-img').src = src;
        document.getElementById('lb-dl').href = src;
        document.getElementById('lb-dl').download = filename;
        document.getElementById('lb-counter').textContent = (lb.imgIdx + 1) + ' ∕ ' + g.images.length;
    }

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape')      closeLightbox();
        if (e.key === 'ArrowLeft')   navigateLightbox(-1);
        if (e.key === 'ArrowRight')  navigateLightbox(1);
    });

    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target.id === 'lightbox') closeLightbox();
    });

    // ─── Toast ───
    let toastTimer;
    function showToast(msg, autoDismiss = 0) {
        clearTimeout(toastTimer);
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        if (autoDismiss > 0) toastTimer = setTimeout(() => el.classList.remove('show'), autoDismiss);
    }

    // ─── Download All ───
    async function downloadAll(gIdx) {
        const g = galleries[gIdx];
        const btn = document.getElementById('dlBtn' + gIdx);
        btn.disabled = true;

        const zip = new JSZip();
        let done = 0;

        showToast('Gathering photos — 0 of ' + g.images.length);

        try {
            await Promise.all(g.images.map(async filename => {
                const src = encodeURIComponent(g.folder) + '/' + encodeURIComponent(filename);
                const res = await fetch(src);
                if (!res.ok) throw new Error('Could not load: ' + filename);
                zip.file(filename, await res.blob());
                done++;
                showToast('Gathering photos — ' + done + ' of ' + g.images.length);
            }));

            showToast('Creating zip archive…');
            const blob = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = g.zipName;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Download started!', 3500);
        } catch (err) {
            console.error(err);
            showToast('Something went wrong — please try again.', 4000);
        }

        btn.disabled = false;
    }
</script>

</body>
</html>
